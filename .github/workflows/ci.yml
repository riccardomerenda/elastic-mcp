name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ElasticMcp.slnx

      - name: Build
        run: dotnet build ElasticMcp.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/ElasticMcp.Tests/ --no-build --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test tests/ElasticMcp.IntegrationTests/ --no-build --configuration Release --verbosity normal
